# TMS ↔ SCP co-located overlay — joins SCP's network and configures the SCP read
# connection. **Opt-in. Not auto-loaded by Compose.**
#
# Background: this used to live as `docker-compose.override.yml`, which Compose
# auto-loads on every bare `docker compose ...` call. That broke every host
# without SCP running locally — the external network `autonomy-scp_autonomy-
# network` doesn't exist there, so even `docker compose ps` errored out.
# Renamed 2026-04-29 so it's only applied when explicitly requested.
#
# When to use this overlay:
#   - Only on a host that runs BOTH the SCP and TMS stacks (e.g. msi-stealth).
#   - Docker external networks don't span hosts; on any other host this overlay
#     will fail with `network ... declared as external, but could not be found`.
#
# How to opt in:
#   - Via the Makefile: `make up SCP_COLOCATED=1` (or `export SCP_COLOCATED=1`
#     once in your shell to apply to every target that uses $(COMPOSE_FILES)).
#   - Direct compose: `docker compose -f docker-compose.yml \
#       -f docker-compose.scp-colocated.yml up -d`. Add `-f docker-compose.dev.yml`
#     between them to combine with dev mode.
#
# Alternative when running TMS on a different host than SCP: don't use this
# overlay. Set SCP_DB_URL to a TCP URL pointing at SCP's host-exposed Postgres
# port (requires SCP to publish 5432 in its compose, e.g. "5433:5432"):
#
#   SCP_DB_URL: postgresql+psycopg2://tms_reader:tms_reader_dev@msi-stealth.local:5433/autonomy

networks:
  autonomy-scp_autonomy-network:
    external: true

services:
  backend:
    # Force GPU build on msi-stealth (RTX 4060)
    build:
      context: ./backend
      dockerfile: Dockerfile.gpu
      args:
        - FORCE_GPU=1
      secrets:
        - autonomy_core_token
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./sap_demo_csvs:/app/data/sap_demo:ro
    # SCP backend already owns host port 8000 on msi-stealth; remap TMS to 8010
    ports: !override
      - "8010:8000"
    networks:
      default: {}
      # Join SCP's network only to reach `autonomy-scp-db`. Override the default
      # service-name alias so we don't also register as `backend` there — that
      # alias is owned by autonomy-scp-backend and collisions cause Docker DNS
      # round-robin between the two backends, breaking SCP auth.
      autonomy-scp_autonomy-network:
        aliases:
          - autonomy-tms-backend
    environment:
      SCP_DB_URL: postgresql+psycopg2://tms_reader:tms_reader_dev@autonomy-scp-db:5432/autonomy
      # IMPORTANT: SCP's Postgres service is also named `db` — when the TMS
      # backend joins both networks, bare `db` hostname becomes ambiguous and
      # can resolve to SCP's DB, silently writing TMS data into SCP. Force the
      # TMS DB URL to use the explicit container-alias hostname.
      DATABASE_URL: postgresql+psycopg2://autonomy_user:autonomy_password@autonomy-tms-db:5432/autonomy
      ASYNC_DATABASE_URL: postgresql+asyncpg://autonomy_user:autonomy_password@autonomy-tms-db:5432/autonomy
